name: Daily Numerology Refresh

on:
  schedule:
    - cron: '1 5 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pixlet
        run: |
          curl -L -o pixlet.tar.gz "https://github.com/tidbyt/pixlet/releases/download/v0.34.0/pixlet_0.34.0_linux_amd64.tar.gz"
          tar -xzf pixlet.tar.gz
          chmod +x pixlet
          sudo mv pixlet /usr/local/bin/

      - name: Render numerology app
        run: pixlet render numerology.star

      - name: Push to Tidbyt
        run: |
          pixlet push --installation-id "numerology" \
            --api-token "${{ secrets.TIDBYT_API_TOKEN }}" \
            "${{ secrets.TIDBYT_DEVICE_ID }}" \
            numerology.webp
