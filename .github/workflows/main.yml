name: Daily Numerology Refresh

on:
  schedule:
    - cron: '1 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Keep workflow alive
        uses: gautamkrishnar/keepalive-workflow@v2

      - name: Install Pixlet
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/tidbyt/pixlet/releases/tags/v0.34.0 | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o pixlet.tar.gz "$DOWNLOAD_URL"
          tar -xzf pixlet.tar.gz
          chmod +x pixlet
          sudo mv pixlet /usr/local/bin/

      - name: Render numerology app
        run: pixlet render numerology.star

      - name: Push to Tidbyt
        run: |
          pixlet push --installation-id "numerology" \
            --api-token "${{ secrets.TIDBYT_API_TOKEN }}" \
            "${{ secrets.TIDBYT_DEVICE_ID }}" \
            numerology.webp
